<!DOCTYPE html>
<html>
<head>
    <title>Todo</title>
</head>
<body>
<h1>Список задач</h1>

<form action="/add/" method="post">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Новая задача">
    <button type="submit">Добавить</button>
</form>

<ul>
    {% for task in tasks %}
    <li>
        <a href="/toggle/{{ task.id }}/">
            {% if task.done %}<s>{{ task.title }}</s>{% else %}{{ task.title }}{% endif %}
        </a>
        <a href="/delete/{{ task.id }}/">Удалить</a>
    </li>
    {% endfor %}
</ul>
</body>
</html>
